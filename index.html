<!-- KGN Review System Section Starts -->
<section id="reviews" style="padding: 50px 20px; background-color: #f9f9f9; font-family: sans-serif;">
    <div style="max-width: 800px; margin: 0 auto;">
        <h2 style="text-align: center; color: #1e40af; font-size: 32px;">Customer Reviews</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Website par hi apna review submit karein!</p>

        <!-- Review Form -->
        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px;">
            <h3 style="margin-top: 0; font-size: 20px;">Review Likhein</h3>
            <div style="margin-bottom: 15px;">
                <input type="text" id="custName" placeholder="Aapka Naam" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 14px; color: #555;">Rating (1-5 Stars):</label>
                <select id="custRating" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; background: white;">
                    <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
                    <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
                    <option value="3">⭐⭐⭐ (3 Stars)</option>
                    <option value="2">⭐⭐ (2 Stars)</option>
                    <option value="1">⭐ (1 Star)</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <textarea id="custComment" placeholder="KGN ki service kaisi lagi?" rows="4" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box;"></textarea>
            </div>
            <button onclick="submitKgnReview()" style="width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                Submit Review
            </button>
            <p id="successMsg" style="color: green; text-align: center; display: none; margin-top: 10px; font-weight: bold;">Review submit ho gaya! Dhanyawad Jaan.</p>
        </div>

        <!-- Display Reviews -->
        <h3 style="font-size: 22px; color: #333;">Recent Reviews</h3>
        <div id="reviewList" style="display: flex; flex-direction: column; gap: 15px;">
            <!-- Reviews will appear here -->
            <div style="background: white; padding: 20px; border-radius: 15px; border-left: 5px solid #2563eb;">
                <p style="margin: 0; font-weight: bold; color: #1e40af;">Arjun Singh <span style="color: #fbbf24;">⭐⭐⭐⭐⭐</span></p>
                <p style="margin: 5px 0; color: #555; font-style: italic;">"Best tank cleaning service in Bangalore!"</p>
                <div style="margin-top: 10px; padding: 10px; background: #eff6ff; border-radius: 10px; font-size: 13px;">
                    <strong style="color: #2563eb;">KGN Reply:</strong> Dhanyawad Arjun bhai!
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Ye function review save karne ke liye hai (Temporary local storage version)
    function submitKgnReview() {
        const name = document.getElementById('custName').value;
        const rating = document.getElementById('custRating').value;
        const comment = document.getElementById('custComment').value;
        const successMsg = document.getElementById('successMsg');

        if(name && comment) {
            // Stars banana
            let stars = "";
            for(let i=0; i<rating; i++) stars += "⭐";

            // Naya review design
            const newReview = `
                <div style="background: white; padding: 20px; border-radius: 15px; border-left: 5px solid #2563eb; animation: fadeIn 0.5s;">
                    <p style="margin: 0; font-weight: bold; color: #1e40af;">${name} <span style="color: #fbbf24;">${stars}</span></p>
                    <p style="margin: 5px 0; color: #555; font-style: italic;">"${comment}"</p>
                </div>
            `;

            // List mein sabse upar add karna
            document.getElementById('reviewList').innerHTML = newReview + document.getElementById('reviewList').innerHTML;
            
            // Clear and Success
            document.getElementById('custName').value = "";
            document.getElementById('custComment').value = "";
            successMsg.style.display = "block";
            setTimeout(() => { successMsg.style.display = "none"; }, 3000);
        } else {
            alert("Jaan, naam aur comment likhna zaroori hai!");
        }
    }
</script>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    button:hover { background: #1e40af !important; transform: scale(1.02); }
</style>
<!-- KGN Review System Section Ends -->
